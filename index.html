<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-black min-h-screen flex items-center justify-center pt-8 sm:pt-0">
    <section class="w-[95%] sm:w-[70%] md:w-[50%] lg:w-[35%] p-4 sm:p-5 shadow-2xl bg-gray-800/50 rounded-xl">
      <input
        type="text"
        placeholder="0"
        class="text-white w-full p-3 sm:p-4 md:p-5 rounded-xl bg-gray-700/50 focus:outline-none text-base sm:text-lg md:text-xl"
        id="output"
      />

      <div class="grid grid-cols-4 gap-2 sm:gap-3 md:gap-4 mt-4 sm:mt-6 text-white text-xs sm:text-sm md:text-base">
        <button onclick="clear_output()" class="bg-gray-700 p-2  rounded-lg">CE</button>
        <button onclick="button_input('%')" class="bg-gray-700 p-2  rounded-lg">%</button>
        <button class="bg-green-700 p-2  rounded-lg">X</button>
        <button onclick="button_input('*')" class="bg-green-700 p-2  rounded-lg">*</button>
        <button onclick="button_input(7)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">7</button>
        <button onclick="button_input(8)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">8</button>
        <button onclick="button_input(9)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">9</button>
        <button onclick="button_input('/')" class="bg-green-700 p-2  rounded-lg">/</button>
        <button onclick="button_input(4)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">4</button>
        <button onclick="button_input(5)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">5</button>
        <button onclick="button_input(6)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">6</button>
        <button onclick="button_input('-')" class="bg-green-700 p-2  rounded-lg">-</button>
        <button onclick="button_input(1)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">1</button>
        <button onclick="button_input(2)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">2</button>
        <button onclick="button_input(3)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">3</button>
        <button onclick="button_input('+')" class="bg-green-700 p-2  rounded-lg">+</button>
        <button onclick="button_input('.')" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">.</button>
        <button onclick="button_input(0)" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">0</button>
        <button onclick="button_input('00')" class="bg-gray-500/25 text-green-600 rounded-lg p-2 ">00</button>
        <button onclick="get_answer()" class="bg-green-700 p-2  rounded-lg">=</button>
      </div>
    </section>

    <script src="calculator.js"></script>
  </body>
</html>
